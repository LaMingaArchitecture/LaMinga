# Netlify configuration for LaMinga.
#
# Two Netlify sites build this same repo from `main`:
#   - prod    (laminga.netlify.app): STORYBLOK_VERSION=published, Public token, static SSG
#   - preview (its own subdomain):   STORYBLOK_VERSION=draft,     Preview token, on-demand SSR
# Per-site values (STORYBLOK_VERSION, tokens, PUBLIC_SITE_URL) live in each site's
# Netlify UI environment variables — NOT here: values set in netlify.toml override
# the UI, so pinning them here would force the same value on both sites.
#
# Framing headers (X-Frame-Options / frame-ancestors) vary per site and are emitted
# into public/_headers by scripts/generate-headers.mjs (keyed off STORYBLOK_VERSION),
# because [[headers]] blocks here cannot branch per site.

[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Gate the preview site behind HTTP Basic-Auth so unpublished drafts aren't public.
# The function self-disables on the prod site (STORYBLOK_VERSION !== 'draft'), so this
# declaration is inert there. Credentials come from PREVIEW_BASIC_AUTH, set only on
# the preview site.
[[edge_functions]]
  path = "/*"
  function = "preview-auth"

# Standard security headers — identical across both sites.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
